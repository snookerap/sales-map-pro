<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sales Scout Pro - Industrie Edition</title>
    
    <!-- Frameworks via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 50vh; width: 100%; z-index: 1; }
        .visited-marker { filter: grayscale(100%) opacity(0.5) !important; }
        .loading-spinner { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Fix für Leaflet Popups auf Mobile */
        .leaflet-popup-content { min-width: 200px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <!-- Header -->
    <div class="p-4 bg-slate-900 text-white shadow-lg flex justify-between items-center sticky top-0 z-[2000]">
        <div>
            <h1 class="text-xl font-bold">Sales Scout Pro 🚀</h1>
            <p class="text-xs text-slate-400">Industrie & Großhandel Finder</p>
        </div>
        <button onclick="updateLocation()" class="bg-slate-700 hover:bg-slate-600 p-3 rounded-full transition-colors">
            📍
        </button>
    </div>

    <!-- Karte -->
    <div id="map"></div>

    <!-- UI Panel -->
    <div class="p-4 bg-white shadow-md rounded-t-3xl -mt-6 relative z-[1500] space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-600 mb-2 ml-1">Zielbranche wählen:</label>
            <select id="industrySelect" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 font-medium transition-all">
                <option value='["industrial"~"factory|works"]'>🏭 Fertigung & Produktion</option>
                <option value='["landuse"="industrial"]'>🏗️ Industriegebiete (allg.)</option>
                <option value='["shop"="wholesale"]'>📦 Großhandel (allgemein)</option>
                <option value='["shop"="wholesale"]["wholesale"~"electrical|electronics"]'>⚡ Elektrogroßhandel</option>
                <option value='["craft"~"electrician|hvac|mechanic"]'>🛠️ Instandhaltung & Handwerk</option>
                <option value='["office"="industrial"]'>🏢 Industriebüros</option>
            </select>
        </div>

        <button onclick="fetchIndustryData()" id="searchBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold
