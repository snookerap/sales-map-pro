<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sales Scout Pro - Advanced</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 50vh; width: 100%; }
        /* Style für besuchte Marker */
        .visited-marker { filter: grayscale(100%) opacity(0.5); }
        .loading-spinner { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="p-4 bg-slate-900 text-white shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">Sales Scout Pro 🚀</h1>
            <p class="text-xs text-slate-400">Industrie-Vertriebs-Tool</p>
        </div>
        <button onclick="updateLocation()" class="bg-slate-700 p-2 rounded-full">📍</button>
    </div>

    <div id="map"></div>

    <div class="p-4 bg-white shadow-md rounded-t-3xl -mt-5 relative z-[1000] space-y-4">
        <select id="industrySelect" class="w-full p-4 bg-gray-100 border-none rounded-2xl shadow-inner outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 font-medium">
            <option value='["industrial"~"factory|works"]'>🏭 Fertigung & Produktion</option>
            <option value='["landuse"="industrial"]'>🏗️ Industriegebiete (allg.)</option>
            <option value='["shop"="wholesale"]'>📦 Großhandel (allgemein)</option>
            <option value='["shop"="wholesale"]["wholesale"~"electrical|electronics"]'>⚡ Elektrogroßhandel</option>
            <option value='["craft"~"electrician|hvac|mechanic"]'>🛠️ Instandhaltung & Handwerk</option>
        </select>

        <button onclick="fetchIndustryData()" id="searchBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg flex justify-center items-center gap-2 transition-all active:scale-95">
            <span>Umgebung scannen</span>
        </button>
    </div>

    <div id="resultList" class="p-4 space-y-2 mb-20">
        <p class="text-gray-400 text-center text-sm italic">Noch keine Ergebnisse geladen.</p>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([51.1, 10.4], 6);
        L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);

        let markerGroup = L.layerGroup().addTo(map);
        let userMarker;

        function updateLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                map.setView([latitude, longitude], 14);
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([latitude, longitude], { color: '#ef4444', fillOpacity: 1, radius: 8, weight: 3, fillColor: 'white' }).addTo(map);
            });
        }
        updateLocation();

        async function fetchIndustryData() {
            const btn = document.getElementById('searchBtn');
            const list = document.getElementById('resultList');
            const industryQuery = document.getElementById('industrySelect').value;
            const center = map.getCenter();
            
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner h-5 w-5 border-2 rounded-full"></div>';
            markerGroup.clearLayers();
            list.innerHTML = "";

            const query = `[out:json][timeout:25];(node${industryQuery}(around:3000, ${center.lat}, ${center.lng});way${industryQuery}(around:3000, ${center.lat}, ${center.lng}););out center;`;
            const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.elements.length === 0) {
                    list.innerHTML = "<p class='text-center text-red-500'>Nichts gefunden.</p>";
                }

                data.elements.forEach(el => {
                    const lat = el.lat || el.center.lat;
                    const lon = el.lon || el.center.lng;
                    const tags = el.tags || {};
                    const name = tags.name || "Gewerbeobjekt";
                    const phone = tags.phone || tags["contact:phone"] || "";
                    const web = tags.website || tags["contact:website"] || "";

                    // Popup UI
                    let popupHtml = `<div class='p-1 font-sans'>
                        <b class='text-lg'>${name}</b><br>
                        <div class='flex flex-wrap gap-2 mt-3'>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank" class='bg-green-600 text-white px-3 py-2 rounded-lg text-xs font-bold no-underline'>🚗 Nav</a>
                            ${phone ? `<a href="tel:${phone}" class='bg-blue-600 text-white px-3 py-2 rounded-lg text-xs font-bold no-underline'>📞 Anrufen</a>` : ''}
                            ${web ? `<a href="${web}" target="_blank" class='bg-gray-700 text-white px-3 py-2 rounded-lg text-xs font-bold no-underline'>🌐 Web</a>` : ''}
                        </div>
                    </div>`;

                    const marker = L.marker([lat, lon]).addTo(markerGroup).bindPopup(popupHtml);

                    // "Besucht"-Logik beim Klick auf den Marker
                    marker.on('click', function() {
                        this._icon.classList.add('visited-marker');
                    });

                    // Listeneintrag unter der Karte erstellen
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex justify-between items-center";
                    card.innerHTML = `
                        <div>
                            <h3 class="font-bold text-gray-800">${name}</h3>
                            <p class="text-xs text-gray-500">${tags.industrial || 'Industrie'}</p>
                        </div>
                        <button onclick="map.setView([${lat}, ${lon}], 17)" class="text-blue-600 text-xl">🎯</button>
                    `;
                    list.appendChild(card);
                });

            } catch (e) {
                alert("Fehler!");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Umgebung scannen</span>';
            }
        }
    </script>
</body>
</html>
